name: Daily HEP-ML Digest

on:
  schedule:
    # UTC 00:17 = Asia/Shanghai 08:17.
    - cron: "17 0 * * *"
  workflow_dispatch:

concurrency:
  group: daily-hepml-digest
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: python -m pip install .

      - name: Build digest
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SCREENING_MODEL: deepseek-v4-flash
          REVIEW_MODEL: deepseek-v4-pro
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          MAX_CANDIDATES: "60"
          BOOTSTRAP_RESULTS: "120"
          MAX_DEEP_REVIEWS: "5"
        run: python -m hepml_digest

      - name: Persist state and reports
        run: |
          git config user.name "hepml-digest-bot"
          git config user.email "hepml-digest-bot@users.noreply.github.com"
          git add data public
          git diff --cached --quiet || git commit -m "daily digest"
          git push

      - name: Configure Pages
        # One-time prerequisite: Settings > Pages > Source = GitHub Actions.
        # Automatic enablement would require a separate high-privilege PAT.
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v5
